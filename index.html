<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Nut Sort — сортировка гаек</title>
  <style>
    :root {
      --bg-1:#0f172a;
      --bg-2:#1e293b;
      --panel:rgba(255,255,255,.09);
      --panel-border:rgba(255,255,255,.16);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#facc15;
      --success:#4ade80;
      --shadow:0 22px 60px rgba(0,0,0,.38);
    }

    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      margin:0;
      min-height:100%;
      background:#0f172a;
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      min-height:100dvh;
      overflow:hidden;
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    .app {
      min-height:100dvh;
      padding:max(16px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 16% 0%, rgba(250,204,21,.16), transparent 28%),
        radial-gradient(circle at 84% 12%, rgba(56,189,248,.14), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(124,58,237,.14), transparent 38%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      display:flex;
      flex-direction:column;
      gap:14px;
      overflow:hidden;
      position:relative;
      isolation:isolate;
    }

    .app::before {
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:34px 34px;
      mask-image:linear-gradient(180deg, transparent, #000 16%, #000 82%, transparent);
      z-index:-1;
    }

    .topbar,
    .card,
    .controls {
      width:100%;
      max-width:980px;
      margin:0 auto;
    }

    .topbar {
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      animation:fadeSlide .55s cubic-bezier(.2,.9,.2,1) both;
    }

    .brand {
      font-size:clamp(22px, 5vw, 34px);
      font-weight:1000;
      letter-spacing:-.045em;
      text-shadow:0 8px 30px rgba(0,0,0,.35);
    }
    .brand span {
      color:var(--accent);
      filter:drop-shadow(0 8px 22px rgba(250,204,21,.28));
    }

    .level-pill,
    .card,
    .btn {
      backdrop-filter:blur(18px);
    }

    .level-pill {
      justify-self:center;
      padding:10px 16px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border:1px solid var(--panel-border);
      font-weight:900;
      white-space:nowrap;
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.22);
    }

    .stats {
      justify-self:end;
      text-align:right;
      color:var(--muted);
      font-weight:800;
      font-size:14px;
    }
    .stats strong {
      color:var(--text);
      font-size:18px;
    }

    .card {
      padding:14px;
      border-radius:28px;
      border:1px solid var(--panel-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.055)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.12), transparent 44%);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.18);
      position:relative;
      overflow:hidden;
    }

    .card::before {
      content:"";
      position:absolute;
      inset:auto -12% -40px -12%;
      height:118px;
      background:
        linear-gradient(90deg, rgba(120,53,15,.24), rgba(217,119,6,.20), rgba(120,53,15,.24)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.07) 0 2px, transparent 2px 46px);
      opacity:.75;
      pointer-events:none;
    }

    .hintline {
      min-height:26px;
      text-align:center;
      color:var(--muted);
      font-weight:850;
      margin-bottom:4px;
      padding-inline:8px;
    }
    .hintline.pop { animation:hintPop .5s cubic-bezier(.2,.9,.2,1) both; }

    .board {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(74px, 1fr));
      gap:22px 12px;
      align-items:end;
      justify-items:center;
      min-height:470px;
      padding:18px 2px 14px;
      position:relative;
      perspective:1200px;
      contain:layout paint;
    }

    .tube {
      position:relative;
      width:76px;
      height:232px;
      border:0;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      touch-action:manipulation;
      transform-style:preserve-3d;
      transition:filter .34s ease, transform .34s ease;
    }
    .tube:hover { filter:brightness(1.03); }
    .tube.selected {
      filter:drop-shadow(0 0 0 rgba(0,0,0,0)) drop-shadow(0 12px 20px rgba(250,204,21,.18));
      transform:scale(1.015);
    }
    .tube.invalid { animation:shake .38s cubic-bezier(.36,.07,.19,.97) 1; }
    .tube.tube-enter { animation:tubeIn .72s cubic-bezier(.18,.9,.22,1.14) both; }

    .tube.complete::after {
      content:"✓";
      position:absolute;
      top:-6px;
      right:-2px;
      width:28px;
      height:28px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#86efac,#22c55e);
      color:#052e16;
      font-weight:1000;
      box-shadow:0 8px 22px rgba(74,222,128,.42), inset 0 1px 0 rgba(255,255,255,.65);
      z-index:8;
      animation:completePop .68s cubic-bezier(.2,.9,.2,1) both;
    }

    .rod {
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      width:12px;
      height:198px;
      border-radius:999px;
      background:
        linear-gradient(90deg, #7c7c7c 0%, #fbfbfb 18%, #d9d9df 38%, #ffffff 52%, #a3a3ad 70%, #6f6f76 100%);
      box-shadow:
        inset 2px 0 2px rgba(255,255,255,.45),
        inset -3px 0 4px rgba(0,0,0,.28),
        0 10px 18px rgba(0,0,0,.28);
      z-index:1;
      overflow:hidden;
    }
    .rod::before {
      content:"";
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(180deg, transparent 0 4px, rgba(0,0,0,.15) 4px 6px);
      mix-blend-mode:multiply;
      opacity:.6;
    }
    .rod::after {
      content:"";
      position:absolute;
      left:50%;
      top:-6px;
      transform:translateX(-50%);
      width:20px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(ellipse at 45% 25%, #fff 0 20%, #d8d8de 40%, #74747b 100%);
      box-shadow:0 3px 5px rgba(0,0,0,.32);
    }

    .base {
      position:absolute;
      left:50%;
      bottom:4px;
      transform:translateX(-50%);
      width:68px;
      height:20px;
      border-radius:50% 50% 18px 18px;
      background:radial-gradient(ellipse at 42% 20%, #fafafa 0 12%, #dbd8d5 42%, #72727a 100%);
      box-shadow:0 10px 18px rgba(0,0,0,.35), inset 0 3px 4px rgba(255,255,255,.62), inset 0 -5px 6px rgba(0,0,0,.20);
      z-index:2;
    }
    .base::after {
      content:"";
      position:absolute;
      inset:4px 9px auto;
      height:6px;
      border-radius:50%;
      background:rgba(255,255,255,.42);
      filter:blur(1px);
    }

    .nuts {
      position:absolute;
      left:50%;
      bottom:21px;
      transform:translateX(-50%);
      width:62px;
      display:flex;
      flex-direction:column-reverse;
      align-items:center;
      z-index:3;
      pointer-events:none;
      filter:drop-shadow(0 12px 16px rgba(0,0,0,.20));
    }

    .nut {
      width:60px;
      height:37px;
      margin-top:-2px;
      position:relative;
      clip-path:polygon(15% 7%,85% 7%,100% 50%,85% 93%,15% 93%,0 50%);
      background:
        radial-gradient(ellipse at 28% 16%, rgba(255,255,255,.58) 0 10%, transparent 30%),
        linear-gradient(90deg, rgba(0,0,0,.35) 0%, rgba(255,255,255,.22) 16%, rgba(255,255,255,.34) 38%, rgba(0,0,0,.10) 64%, rgba(0,0,0,.40) 100%),
        linear-gradient(180deg, rgba(255,255,255,.20) 0%, transparent 38%, rgba(0,0,0,.24) 100%),
        var(--c);
      box-shadow:
        inset 0 7px 8px rgba(255,255,255,.28),
        inset 0 -8px 9px rgba(0,0,0,.28),
        inset 8px 0 10px rgba(255,255,255,.10),
        inset -8px 0 10px rgba(0,0,0,.24),
        0 5px 8px rgba(0,0,0,.34);
      transition:transform .42s cubic-bezier(.2,.9,.2,1), filter .42s ease, opacity .24s ease;
      transform-style:preserve-3d;
      will-change:transform;
    }
    .nut::before {
      content:"";
      position:absolute;
      inset:3px 5px;
      clip-path:inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,.24), transparent 34%, rgba(0,0,0,.14)),
        radial-gradient(ellipse at 50% 50%, transparent 0 26%, rgba(255,255,255,.18) 29% 34%, transparent 38%);
      opacity:.92;
      pointer-events:none;
    }
    .nut::after {
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:17px;
      height:17px;
      border-radius:50%;
      background:
        radial-gradient(circle at 45% 42%, #111827 0 30%, #6b7280 31% 45%, #f8fafc 48% 60%, rgba(255,255,255,.15) 66%),
        linear-gradient(180deg, rgba(255,255,255,.34), rgba(0,0,0,.30));
      box-shadow:inset 0 3px 5px rgba(0,0,0,.68), 0 1px 2px rgba(255,255,255,.42);
    }

    .nut.nut-enter { animation:nutDrop .82s cubic-bezier(.16,1.04,.28,1.02) both; }
    .nut.move-group { filter:brightness(1.08) saturate(1.08); }
    .selected .nut.move-group { transform:translateY(-8px) rotateZ(-3deg) scale(1.02); }
    .selected .nut.move-group:nth-last-child(2) { transform:translateY(-6px) rotateZ(3deg) scale(1.015); }
    .landing-ghost { opacity:0; }

    .fly-nut {
      position:fixed;
      margin:0;
      z-index:999;
      pointer-events:none;
      will-change:transform;
      filter:drop-shadow(0 22px 18px rgba(0,0,0,.34)) saturate(1.08);
    }

    .controls {
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      animation:fadeUp .6s cubic-bezier(.2,.9,.2,1) both;
    }

    .btn {
      border:1px solid var(--panel-border);
      border-radius:18px;
      min-height:54px;
      padding:10px 12px;
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.07));
      color:var(--text);
      font:inherit;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .24s ease, box-shadow .24s ease, filter .24s ease;
    }
    .btn:hover { transform:translateY(-1px); box-shadow:0 14px 30px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.22); }
    .btn:active { transform:scale(.99); }
    .btn.primary {
      background:linear-gradient(180deg,#fde047,#eab308);
      color:#201a00;
      border-color:transparent;
      box-shadow:0 14px 34px rgba(250,204,21,.24), inset 0 1px 0 rgba(255,255,255,.52);
    }
    .btn:disabled { opacity:.42; cursor:not-allowed; transform:none; }

    .modal {
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      padding:20px;
      background:rgba(2,6,23,.68);
      backdrop-filter:blur(10px);
      z-index:20;
    }
    .modal.show { display:grid; }
    .modal-box {
      width:min(430px,100%);
      padding:28px;
      border-radius:30px;
      text-align:center;
      background:
        radial-gradient(circle at 50% 0%, rgba(250,204,21,.25), transparent 36%),
        linear-gradient(180deg,#ffffff,#e5e7eb);
      color:#111827;
      box-shadow:0 34px 90px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.75);
      animation:modalPop .56s cubic-bezier(.18,.9,.2,1.18) both;
      position:relative;
      overflow:hidden;
    }
    .modal-box::before {
      content:"";
      position:absolute;
      inset:-60% auto auto -45%;
      width:70%;
      height:220%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
      transform:rotate(18deg);
      animation:shine 1.8s ease .24s both;
    }
    .modal-box h2 { margin:0 0 8px; font-size:34px; }
    .modal-box p { margin:0 0 18px; color:#475569; font-weight:700; }
    .modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .toast {
      position:fixed;
      left:50%;
      bottom:max(24px, env(safe-area-inset-bottom));
      transform:translate(-50%, 120px);
      background:#fff;
      color:#111827;
      padding:12px 16px;
      border-radius:999px;
      font-weight:900;
      box-shadow:0 15px 40px rgba(0,0,0,.35);
      transition:transform .34s cubic-bezier(.2,.9,.2,1);
      z-index:30;
      white-space:nowrap;
    }
    .toast.show { transform:translate(-50%,0); }

    .confetti {
      position:fixed;
      width:9px;
      height:14px;
      border-radius:3px;
      top:-18px;
      z-index:40;
      pointer-events:none;
      background:var(--confetti);
      animation:confettiFall var(--fall, 1.6s) linear forwards;
    }

    @keyframes shake {
      0%,100% { transform:translateX(0) scale(1.015); }
      25% { transform:translateX(-8px) scale(1.015); }
      75% { transform:translateX(8px) scale(1.015); }
    }
    @keyframes fadeSlide { from{opacity:0; transform:translateY(-14px)} to{opacity:1; transform:none} }
    @keyframes fadeUp { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }
    @keyframes tubeIn { from{opacity:0; transform:translateY(28px) scale(.96)} to{opacity:1; transform:none} }
    @keyframes nutDrop {
      0% { opacity:0; transform:translateY(-40px) scale(.9) rotateZ(-8deg); }
      68% { opacity:1; transform:translateY(4px) scale(1.03) rotateZ(3deg); }
      100% { opacity:1; transform:none; }
    }
    @keyframes completePop {
      0% { opacity:0; transform:scale(.2) rotate(-30deg); }
      70% { opacity:1; transform:scale(1.14) rotate(6deg); }
      100% { opacity:1; transform:scale(1) rotate(0); }
    }
    @keyframes modalPop { from{opacity:0; transform:translateY(18px) scale(.92)} to{opacity:1; transform:none} }
    @keyframes hintPop { 0%{transform:scale(.985)} 50%{transform:scale(1.018); color:#fff} 100%{transform:scale(1); color:var(--muted)} }
    @keyframes shine { from{transform:translateX(0) rotate(18deg)} to{transform:translateX(260%) rotate(18deg)} }
    @keyframes confettiFall { to{transform:translate3d(var(--drift), 108vh, 0) rotate(740deg); opacity:.15} }

    @media (max-width:600px) {
      .topbar { grid-template-columns:1fr auto; }
      .level-pill { order:3; grid-column:1/-1; }
      .stats { font-size:12px; }
      .stats strong { font-size:16px; }
      .card { padding:10px 8px; border-radius:22px; }
      .board { grid-template-columns:repeat(4,1fr); gap:18px 2px; min-height:430px; }
      .tube { width:68px; height:205px; }
      .rod { width:11px; height:180px; }
      .nut { width:54px; height:33px; }
      .nuts { width:56px; }
      .base { width:58px; }
      .controls { grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">NUT <span>SORT</span></div>
      <div class="level-pill">Уровень <span id="level">1</span></div>
      <div class="stats">Ходы<br><strong id="moves">0</strong></div>
    </header>

    <section class="card">
      <div class="hintline" id="hintline">Собери гайки одного цвета на каждом стержне</div>
      <div class="board" id="board" aria-label="Игровое поле"></div>
    </section>

    <section class="controls">
      <button class="btn" id="undoBtn">↶ Отменить</button>
      <button class="btn" id="hintBtn">💡 Подсказка</button>
      <button class="btn" id="restartBtn">⟳ Заново</button>
      <button class="btn primary" id="newBtn">Новый уровень</button>
    </section>
  </main>

  <div class="modal" id="winModal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div style="font-size:58px">🏆</div>
      <h2>Уровень пройден!</h2>
      <p>Отличная сортировка. Переходим дальше?</p>
      <div class="modal-actions">
        <button class="btn" id="replayBtn" style="color:#111827;border-color:#cbd5e1;background:#fff">Повторить</button>
        <button class="btn primary" id="nextBtn">Дальше →</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const COLORS = ['#22c55e','#8b5cf6','#ef4444','#06b6d4','#facc15','#f97316','#ec4899','#3b82f6'];
    const CAPACITY = 5;

    const boardEl = document.getElementById('board');
    const movesEl = document.getElementById('moves');
    const levelEl = document.getElementById('level');
    const hintline = document.getElementById('hintline');
    const undoBtn = document.getElementById('undoBtn');
    const winModal = document.getElementById('winModal');
    const toastEl = document.getElementById('toast');

    let level = Number(localStorage.getItem('nutSortLevel') || 1);
    let tubes = [];
    let initialTubes = [];
    let selected = null;
    let history = [];
    let moves = 0;
    let locked = false;
    let introMode = false;
    let arrival = null;

    const cloneState = state => state.map(t => [...t]);
    const randomInt = max => Math.floor(Math.random() * max);

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function generateLevel(levelNumber) {
      const colorCount = Math.min(4 + Math.floor((levelNumber - 1) / 3), 7);
      const emptyCount = 2;
      const pieces = [];
      for (let c = 0; c < colorCount; c++) {
        for (let i = 0; i < CAPACITY; i++) pieces.push(c);
      }

      let candidate;
      let attempts = 0;
      do {
        const mixed = shuffle(pieces);
        candidate = [];
        for (let i = 0; i < colorCount; i++) candidate.push(mixed.slice(i * CAPACITY, (i + 1) * CAPACITY));
        for (let i = 0; i < emptyCount; i++) candidate.push([]);
        attempts++;
      } while ((isSolved(candidate) || candidate.some(t => t.length && t.every(v => v === t[0]))) && attempts < 220);

      return candidate;
    }

    function startLevel(newLevel = level) {
      level = newLevel;
      localStorage.setItem('nutSortLevel', String(level));
      tubes = generateLevel(level);
      initialTubes = cloneState(tubes);
      history = [];
      selected = null;
      moves = 0;
      locked = false;
      arrival = null;
      introMode = true;
      winModal.classList.remove('show');
      setHint('Собери гайки одного цвета на каждом стержне');
      render();
      setTimeout(() => { introMode = false; }, 900);
    }

    function render() {
      levelEl.textContent = level;
      movesEl.textContent = moves;
      undoBtn.disabled = history.length === 0 || locked;
      boardEl.innerHTML = '';

      tubes.forEach((tube, index) => {
        const button = document.createElement('button');
        button.className = 'tube';
        button.setAttribute('aria-label', `Стержень ${index + 1}`);
        if (selected === index) button.classList.add('selected');
        if (introMode) {
          button.classList.add('tube-enter');
          button.style.animationDelay = `${index * 45}ms`;
        }
        if (tube.length === CAPACITY && tube.every(v => v === tube[0])) button.classList.add('complete');

        const rod = document.createElement('div');
        rod.className = 'rod';
        const base = document.createElement('div');
        base.className = 'base';
        const nuts = document.createElement('div');
        nuts.className = 'nuts';
        const selectedGroupSize = selected === index ? getTopGroupSize(tube) : 0;

        tube.forEach((colorIndex, nutIndex) => {
          const nut = document.createElement('div');
          nut.className = 'nut';
          nut.dataset.tube = index;
          nut.dataset.index = nutIndex;
          if (selectedGroupSize && nutIndex >= tube.length - selectedGroupSize) nut.classList.add('move-group');
          if (arrival && arrival.tube === index && nutIndex >= arrival.start && nutIndex < arrival.start + arrival.count) nut.classList.add('landing-ghost');
          if (introMode) {
            nut.classList.add('nut-enter');
            nut.style.animationDelay = `${140 + index * 34 + nutIndex * 44}ms`;
          }
          nut.style.setProperty('--c', COLORS[colorIndex]);
          nuts.appendChild(nut);
        });

        button.append(rod, base, nuts);
        button.addEventListener('click', () => handleTube(index));
        boardEl.appendChild(button);
      });
    }

    const topColor = tube => tube[tube.length - 1];

    function getTopGroupSize(tube) {
      if (tube.length === 0) return 0;
      const color = topColor(tube);
      let count = 0;
      for (let i = tube.length - 1; i >= 0 && tube[i] === color; i--) count++;
      return count;
    }

    function getMoveCount(from, to) {
      if (from === to) return 0;
      if (tubes[from].length === 0) return 0;
      if (tubes[to].length >= CAPACITY) return 0;
      if (tubes[to].length > 0 && topColor(tubes[from]) !== topColor(tubes[to])) return 0;

      const sameColorGroup = getTopGroupSize(tubes[from]);
      const freeSpace = CAPACITY - tubes[to].length;
      return Math.min(sameColorGroup, freeSpace);
    }

    const canMove = (from, to) => getMoveCount(from, to) > 0;

    function formatNutCount(count) {
      if (count === 1) return '1 гайка';
      if (count >= 2 && count <= 4) return `${count} гайки`;
      return `${count} гаек`;
    }

    async function handleTube(index) {
      if (locked) return;

      if (selected === null) {
        if (tubes[index].length === 0) return showToast('Здесь пока нет гаек');
        selected = index;
        const groupCount = getTopGroupSize(tubes[index]);
        setHint(groupCount > 1
          ? `Выбрана группа: ${formatNutCount(groupCount)} одного цвета`
          : 'Теперь выбери стержень, куда перенести гайку');
        render();
        pulseTube(index);
        return;
      }

      if (selected === index) {
        selected = null;
        setHint('Выбор отменён');
        render();
        return;
      }

      const from = selected;
      const moveCount = getMoveCount(from, index);
      if (!moveCount) {
        selected = null;
        setHint('Такой ход нельзя сделать');
        render();
        const target = boardEl.children[index];
        target?.classList.add('invalid');
        setTimeout(() => target?.classList.remove('invalid'), 420);
        return;
      }

      const fromEls = getNutElements(from).slice(-moveCount);
      const fromRects = fromEls.map(el => el.getBoundingClientRect());
      const movingNuts = tubes[from].slice(tubes[from].length - moveCount);

      history.push({ state: cloneState(tubes), moves });
      tubes[from].splice(tubes[from].length - moveCount, moveCount);
      tubes[index].push(...movingNuts);
      moves++;
      selected = null;
      locked = true;
      arrival = { tube:index, start:tubes[index].length - moveCount, count:moveCount };
      setHint(moveCount > 1 ? `Перенесено сразу: ${formatNutCount(moveCount)}` : 'Хороший ход!');
      render();

      const toEls = getNutElements(index).slice(-moveCount);
      const toRects = toEls.map(el => el.getBoundingClientRect());
      await animateFlyingNuts(movingNuts, fromRects, toRects);

      arrival = null;
      locked = false;
      render();

      if (isSolved(tubes)) triggerWin();
    }

    function getNutElements(tubeIndex) {
      return Array.from(boardEl.children[tubeIndex]?.querySelectorAll('.nut') || []);
    }

    function animateFlyingNuts(colors, fromRects, toRects) {
      const animations = colors.map((colorIndex, i) => {
        const from = fromRects[i];
        const to = toRects[i];
        if (!from || !to) return Promise.resolve();

        const clone = document.createElement('div');
        clone.className = 'nut fly-nut';
        clone.style.setProperty('--c', COLORS[colorIndex]);
        clone.style.left = `${from.left}px`;
        clone.style.top = `${from.top}px`;
        clone.style.width = `${from.width}px`;
        clone.style.height = `${from.height}px`;
        document.body.appendChild(clone);

        const dx = to.left - from.left;
        const dy = to.top - from.top;
        const lift = Math.min(165, 82 + Math.abs(dx) * .36 + i * 8);
        const spin = (i % 2 === 0 ? 14 : -14) + i * 3;
        const duration = 760 + i * 90;
        const delay = i * 60;

        const animation = clone.animate([
          {
            transform:'translate3d(0,0,0) scale(1) rotateZ(0deg)',
            offset:0,
            easing:'cubic-bezier(.22,.84,.18,1)'
          },
          {
            transform:`translate3d(${dx * .46}px, ${dy * .32 - lift}px, 0) scale(1.12) rotateZ(${spin}deg)`,
            offset:.52,
            easing:'cubic-bezier(.22,.84,.18,1)'
          },
          {
            transform:`translate3d(${dx}px, ${dy}px, 0) scale(1) rotateZ(0deg)`,
            offset:1,
            easing:'cubic-bezier(.18,.9,.2,1)'
          }
        ], { duration, delay, fill:'forwards' });

        return animation.finished.then(() => clone.remove()).catch(() => clone.remove());
      });

      return Promise.all(animations);
    }

    function pulseTube(index) {
      const tube = boardEl.children[index];
      tube?.animate([
        { transform:'scale(1.015)', filter:'brightness(1)' },
        { transform:'scale(1.035)', filter:'brightness(1.06)' },
        { transform:'scale(1.015)', filter:'brightness(1)' }
      ], { duration:520, easing:'cubic-bezier(.2,.9,.2,1)' });
    }

    function isSolved(state) {
      return state.every(tube => tube.length === 0 || (tube.length === CAPACITY && tube.every(v => v === tube[0])));
    }

    function triggerWin() {
      locked = true;
      createConfetti();
      setTimeout(() => winModal.classList.add('show'), 520);
    }

    function undo() {
      if (locked) return;
      const previous = history.pop();
      if (!previous) return;
      tubes = cloneState(previous.state);
      moves = previous.moves;
      selected = null;
      arrival = null;
      locked = false;
      setHint('Последний ход отменён');
      render();
    }

    function restart() {
      tubes = cloneState(initialTubes);
      history = [];
      selected = null;
      arrival = null;
      moves = 0;
      locked = false;
      introMode = true;
      winModal.classList.remove('show');
      setHint('Уровень начат заново');
      render();
      setTimeout(() => { introMode = false; }, 900);
    }

    function getPossibleMoves() {
      const result = [];
      for (let from = 0; from < tubes.length; from++) {
        for (let to = 0; to < tubes.length; to++) {
          const count = getMoveCount(from, to);
          if (!count) continue;
          const movingColor = topColor(tubes[from]);
          const joinsSame = tubes[to].length > 0 && topColor(tubes[to]) === movingColor;
          const exposesDifferent = tubes[from].length > count && tubes[from][tubes[from].length - count - 1] !== movingColor;
          result.push({ from, to, count, score:(count * 3) + (joinsSame ? 4 : 0) + (exposesDifferent ? 2 : 0) - (tubes[to].length === 0 ? 1 : 0) });
        }
      }
      return result.sort((a,b) => b.score - a.score);
    }

    function showHint() {
      if (locked) return;
      const move = getPossibleMoves()[0];
      if (!move) return showToast('Доступных ходов нет — попробуй отменить ход');
      selected = move.from;
      setHint(`Подсказка: перенеси ${formatNutCount(move.count)} со стержня ${move.from + 1} на ${move.to + 1}`);
      render();
      const target = boardEl.children[move.to];
      target?.animate([
        { transform:'scale(1)', filter:'brightness(1)' },
        { transform:'scale(1.045)', filter:'brightness(1.08)' },
        { transform:'scale(1)', filter:'brightness(1)' }
      ], { duration:860, iterations:2, easing:'cubic-bezier(.2,.9,.2,1)' });
    }

    function setHint(message) {
      hintline.textContent = message;
      hintline.classList.remove('pop');
      void hintline.offsetWidth;
      hintline.classList.add('pop');
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1900);
    }

    function createConfetti() {
      const colors = ['#facc15','#22c55e','#38bdf8','#8b5cf6','#ef4444','#ec4899'];
      for (let i = 0; i < 54; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.setProperty('--confetti', colors[i % colors.length]);
        piece.style.setProperty('--drift', `${(Math.random() * 2 - 1) * 120}px`);
        piece.style.setProperty('--fall', `${1.4 + Math.random() * 1.4}s`);
        piece.style.animationDelay = `${Math.random() * .28}s`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3200);
      }
    }

    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('hintBtn').addEventListener('click', showHint);
    document.getElementById('restartBtn').addEventListener('click', restart);
    document.getElementById('newBtn').addEventListener('click', () => startLevel(level));
    document.getElementById('replayBtn').addEventListener('click', restart);
    document.getElementById('nextBtn').addEventListener('click', () => startLevel(level + 1));

    startLevel(level);
  </script>
</body>
</html>
