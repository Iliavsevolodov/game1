<html lang="ru">
<head>

  <title>Nut Sort — сортировка гаек</title>
  <style>
    :root{--bg:#0f172a;--bg2:#1e293b;--panel:rgba(255,255,255,.1);--line:rgba(255,255,255,.17);--text:#f8fafc;--muted:#cbd5e1;--yellow:#facc15;--green:#4ade80;--shadow:0 22px 60px rgba(0,0,0,.38);--app-h:100svh}

    .app{height:var(--app-h);padding:max(14px,env(safe-area-inset-top)) 14px max(14px,env(safe-area-inset-bottom));display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:12px;overflow:hidden;background:radial-gradient(circle at 18% 0%,rgba(250,204,21,.16),transparent 28%),radial-gradient(circle at 82% 14%,rgba(56,189,248,.15),transparent 30%),radial-gradient(circle at 50% 100%,rgba(124,58,237,.16),transparent 38%),linear-gradient(180deg,var(--bg),var(--bg2));isolation:isolate;position:relative}.app:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(180deg,transparent,#000 16%,#000 78%,transparent);z-index:-1}
    .topbar,.card,.controls{width:100%;max-width:980px;margin:0 auto}.topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;animation:fade .45s cubic-bezier(.2,.9,.2,1) both}.brand{font-size:clamp(22px,5vw,34px);font-weight:1000;letter-spacing:-.045em;text-shadow:0 8px 30px rgba(0,0,0,.35)}.brand span{color:var(--yellow);filter:drop-shadow(0 8px 22px rgba(250,204,21,.28))}.level-pill{justify-self:center;padding:9px 14px;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.075));border:1px solid var(--line);backdrop-filter:blur(16px);font-weight:900;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.22);white-space:nowrap}.stats{justify-self:end;text-align:right;color:var(--muted);font-weight:800;font-size:14px}.stats strong{color:var(--text);font-size:18px}
    .card{height:100%;min-height:0;padding:12px;border-radius:28px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.055)),radial-gradient(circle at 50% 0%,rgba(255,255,255,.12),transparent 46%);backdrop-filter:blur(20px);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.18);position:relative;overflow:hidden;display:grid;grid-template-rows:auto minmax(0,1fr);contain:layout paint}.card:before{content:"";position:absolute;inset:auto -10% -38px;height:115px;background:linear-gradient(90deg,rgba(120,53,15,.26),rgba(217,119,6,.22),rgba(120,53,15,.26)),repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0 2px,transparent 2px 46px);opacity:.75;pointer-events:none}.hintline{text-align:center;color:var(--muted);font-weight:850;min-height:28px;line-height:28px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hintline.pop{animation:hintPop .34s cubic-bezier(.2,.9,.2,1) both}
    .board{--cols:4;display:grid;grid-template-columns:repeat(var(--cols),minmax(0,1fr));grid-template-rows:repeat(2,minmax(0,1fr));gap:18px 6px;align-items:end;justify-items:center;width:100%;height:100%;min-height:0;padding:14px 2px 10px;position:relative;perspective:1000px;overflow:hidden;contain:layout paint}.tube{position:relative;width:100%;max-width:76px;height:100%;min-height:180px;max-height:230px;border:0;background:transparent;padding:0;cursor:pointer;display:flex;justify-content:flex-end;align-items:center;touch-action:manipulation;transform:translateZ(0);outline:none;transition:filter .34s ease,transform .34s ease}.tube:before{content:"";position:absolute;inset:-8px 3px -4px;border-radius:26px;border:1px solid transparent;opacity:0;transition:opacity .24s ease,border-color .24s ease,background .24s ease;pointer-events:none;z-index:0}.tube.selected{filter:drop-shadow(0 14px 20px rgba(250,204,21,.22));transform:scale(1.012)}.tube.selected:before{opacity:1;border-color:rgba(250,204,21,.55);background:linear-gradient(180deg,rgba(250,204,21,.15),rgba(250,204,21,.035));box-shadow:0 18px 38px rgba(250,204,21,.10)}.tube.invalid{animation:shake .38s cubic-bezier(.36,.07,.19,.97) 1}.tube.enter{animation:tubeIn .58s cubic-bezier(.18,.9,.22,1.14) both}.tube.done:after{content:"✓";position:absolute;top:-6px;right:0;width:27px;height:27px;border-radius:999px;display:grid;place-items:center;background:linear-gradient(180deg,#86efac,#22c55e);color:#052e16;font-weight:1000;box-shadow:0 8px 22px rgba(74,222,128,.42),inset 0 1px 0 rgba(255,255,255,.65);z-index:8;animation:pop .55s cubic-bezier(.2,.9,.2,1) both}
    .rod{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:12px;height:calc(100% - 18px);max-height:198px;border-radius:999px;background:linear-gradient(90deg,#777 0%,#fbfbfb 18%,#d9d9df 38%,#fff 52%,#a3a3ad 70%,#6f6f76 100%);box-shadow:inset 2px 0 2px rgba(255,255,255,.45),inset -3px 0 4px rgba(0,0,0,.28),0 10px 18px rgba(0,0,0,.28);z-index:1;overflow:hidden}.rod:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0 4px,rgba(0,0,0,.14) 4px 6px);mix-blend-mode:multiply;opacity:.58}.rod:after{content:"";position:absolute;left:50%;top:-1px;transform:translateX(-50%);width:20px;height:10px;border-radius:50%;background:radial-gradient(ellipse at 45% 25%,#fff 0 20%,#d8d8de 40%,#74747b 100%);box-shadow:0 3px 5px rgba(0,0,0,.32)}.base{position:absolute;left:50%;bottom:4px;transform:translateX(-50%);width:90%;max-width:68px;height:20px;border-radius:50% 50% 18px 18px;background:radial-gradient(ellipse at 42% 20%,#fafafa 0 12%,#dbd8d5 42%,#72727a 100%);box-shadow:0 10px 18px rgba(0,0,0,.35),inset 0 3px 4px rgba(255,255,255,.62),inset 0 -5px 6px rgba(0,0,0,.20);z-index:2}.base:after{content:"";position:absolute;inset:4px 9px auto;height:6px;border-radius:50%;background:rgba(255,255,255,.42);filter:blur(1px)}
    .nuts{position:absolute;left:50%;bottom:21px;transform:translateX(-50%);width:84%;max-width:62px;display:flex;flex-direction:column-reverse;align-items:center;z-index:3;pointer-events:none;filter:drop-shadow(0 12px 16px rgba(0,0,0,.20))}.nut{width:100%;max-width:60px;height:37px;margin-top:-2px;position:relative;clip-path:polygon(15% 7%,85% 7%,100% 50%,85% 93%,15% 93%,0 50%);background:radial-gradient(ellipse at 28% 16%,rgba(255,255,255,.58) 0 10%,transparent 30%),linear-gradient(90deg,rgba(0,0,0,.35) 0%,rgba(255,255,255,.22) 16%,rgba(255,255,255,.34) 38%,rgba(0,0,0,.10) 64%,rgba(0,0,0,.40) 100%),linear-gradient(180deg,rgba(255,255,255,.20) 0%,transparent 38%,rgba(0,0,0,.24) 100%),var(--c);box-shadow:inset 0 7px 8px rgba(255,255,255,.28),inset 0 -8px 9px rgba(0,0,0,.28),inset 8px 0 10px rgba(255,255,255,.10),inset -8px 0 10px rgba(0,0,0,.24),0 5px 8px rgba(0,0,0,.34);transition:transform .42s cubic-bezier(.2,.9,.2,1),filter .42s ease,opacity .24s ease;will-change:transform}.nut:before{content:"";position:absolute;inset:3px 5px;clip-path:inherit;background:linear-gradient(180deg,rgba(255,255,255,.24),transparent 34%,rgba(0,0,0,.14)),radial-gradient(ellipse at 50% 50%,transparent 0 26%,rgba(255,255,255,.18) 29% 34%,transparent 38%);opacity:.92}.nut:after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:17px;height:17px;border-radius:50%;background:radial-gradient(circle at 45% 42%,#111827 0 30%,#6b7280 31% 45%,#f8fafc 48% 60%,rgba(255,255,255,.15) 66%),linear-gradient(180deg,rgba(255,255,255,.34),rgba(0,0,0,.30));box-shadow:inset 0 3px 5px rgba(0,0,0,.68),0 1px 2px rgba(255,255,255,.42)}.nut.enter{animation:nutDrop .78s cubic-bezier(.16,1.04,.28,1.02) both}.nut.move{filter:brightness(1.08) saturate(1.08)}.selected .nut.move{transform:translateY(-8px) rotateZ(-3deg) scale(1.02)}.selected .nut.move:nth-last-child(2){transform:translateY(-6px) rotateZ(3deg) scale(1.015)}.ghost{opacity:0}.fly{position:fixed;margin:0;z-index:999;pointer-events:none;will-change:transform;filter:drop-shadow(0 22px 18px rgba(0,0,0,.34)) saturate(1.08)}
    .controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;animation:up .5s cubic-bezier(.2,.9,.2,1) both}.btn{border:1px solid var(--line);border-radius:18px;min-height:54px;padding:10px 12px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.07));color:var(--text);font-weight:900;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.18);backdrop-filter:blur(16px);transition:transform .22s ease,box-shadow .22s ease}.btn:active{transform:scale(.99)}.btn.primary{background:linear-gradient(180deg,#fde047,#eab308);color:#201a00;border-color:transparent;box-shadow:0 14px 34px rgba(250,204,21,.24),inset 0 1px 0 rgba(255,255,255,.52)}.btn:disabled{opacity:.42;cursor:not-allowed}.modal{position:fixed;inset:0;display:none;place-items:center;padding:20px;background:rgba(2,6,23,.68);backdrop-filter:blur(10px);z-index:20}.modal.show{display:grid}.modal-box{width:min(430px,100%);padding:28px;border-radius:30px;text-align:center;background:radial-gradient(circle at 50% 0%,rgba(250,204,21,.25),transparent 36%),linear-gradient(180deg,#fff,#e5e7eb);color:#111827;box-shadow:0 34px 90px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.75);animation:modalPop .55s cubic-bezier(.18,.9,.2,1.18) both}.modal-box h2{margin:0 0 8px;font-size:34px}.modal-box p{margin:0 0 18px;color:#475569;font-weight:700}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.toast{position:fixed;left:50%;bottom:max(24px,env(safe-area-inset-bottom));transform:translate(-50%,120px);background:#fff;color:#111827;padding:12px 16px;border-radius:999px;font-weight:900;box-shadow:0 15px 40px rgba(0,0,0,.35);transition:transform .34s cubic-bezier(.2,.9,.2,1);z-index:30;white-space:nowrap}.toast.show{transform:translate(-50%,0)}.confetti{position:fixed;width:9px;height:14px;border-radius:3px;top:-18px;z-index:40;pointer-events:none;background:var(--confetti);animation:confettiFall var(--fall,1.6s) linear forwards}
    @keyframes shake{0%,100%{transform:translateX(0) scale(1.012)}25%{transform:translateX(-8px) scale(1.012)}75%{transform:translateX(8px) scale(1.012)}}@keyframes fade{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}@keyframes tubeIn{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}@keyframes nutDrop{0%{opacity:0;transform:translateY(-36px) scale(.9) rotateZ(-8deg)}70%{opacity:1;transform:translateY(4px) scale(1.025) rotateZ(3deg)}100%{opacity:1;transform:none}}@keyframes pop{0%{opacity:0;transform:scale(.2) rotate(-30deg)}70%{opacity:1;transform:scale(1.14) rotate(6deg)}100%{opacity:1;transform:scale(1) rotate(0)}}@keyframes modalPop{from{opacity:0;transform:translateY(18px) scale(.92)}to{opacity:1;transform:none}}@keyframes hintPop{0%{transform:scale(.985)}50%{transform:scale(1.018);color:#fff}100%{transform:scale(1);color:var(--muted)}}@keyframes confettiFall{to{transform:translate3d(var(--drift),108vh,0) rotate(740deg);opacity:.15}}
    @media(max-width:600px){.topbar{grid-template-columns:1fr auto}.level-pill{order:3;grid-column:1/-1}.stats{font-size:12px}.stats strong{font-size:16px}.app{padding:max(12px,env(safe-area-inset-top)) 10px max(12px,env(safe-area-inset-bottom));gap:10px}.card{padding:10px 8px;border-radius:22px}.board{gap:18px 4px;padding:12px 0 8px}.tube{max-width:68px;min-height:168px;max-height:205px}.nut{height:33px}.rod{width:11px;max-height:180px}.base{height:19px}.controls{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><div class="brand">NUT <span>SORT</span></div><div class="level-pill">Уровень <span id="level">1</span></div><div class="stats">Ходы<br><strong id="moves">0</strong></div></header>
    <section class="card"><div class="hintline" id="hintline">Собери гайки одного цвета на каждом стержне</div><div class="board" id="board" aria-label="Игровое поле"></div></section>
    <section class="controls"><button class="btn" id="undoBtn">↶ Отменить</button><button class="btn" id="hintBtn">💡 Подсказка</button><button class="btn" id="restartBtn">⟳ Заново</button><button class="btn primary" id="newBtn">Новый уровень</button></section>
  </main>
  <div class="modal" id="winModal" role="dialog" aria-modal="true"><div class="modal-box"><div style="font-size:58px">🏆</div><h2>Уровень пройден!</h2><p>Отличная сортировка. Переходим дальше?</p><div class="modal-actions"><button class="btn" id="replayBtn" style="color:#111827;border-color:#cbd5e1;background:#fff">Повторить</button><button class="btn primary" id="nextBtn">Дальше →</button></div></div></div><div class="toast" id="toast"></div>
  <script>
    const COLORS=['#22c55e','#8b5cf6','#ef4444','#06b6d4','#facc15','#f97316','#ec4899','#3b82f6'],CAPACITY=5;
    const boardEl=document.getElementById('board'),movesEl=document.getElementById('moves'),levelEl=document.getElementById('level'),hintline=document.getElementById('hintline'),undoBtn=document.getElementById('undoBtn'),winModal=document.getElementById('winModal'),toastEl=document.getElementById('toast');
    let level=Number(localStorage.getItem('nutSortLevel')||1),tubes=[],initialTubes=[],selected=null,history=[],moves=0,locked=false,introMode=false,arrival=null;
    const clone=s=>s.map(t=>[...t]),rnd=m=>Math.floor(Math.random()*m),top=t=>t[t.length-1];
    function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
    function solved(state){return state.every(t=>t.length===0||(t.length===CAPACITY&&t.every(v=>v===t[0])))}
    function gen(lv){const colors=Math.min(4+Math.floor((lv-1)/3),7),pieces=[];for(let c=0;c<colors;c++)for(let i=0;i<CAPACITY;i++)pieces.push(c);let c,tries=0;do{const mixed=shuffle(pieces);c=[];for(let i=0;i<colors;i++)c.push(mixed.slice(i*CAPACITY,(i+1)*CAPACITY));c.push([],[]);tries++}while((solved(c)||c.some(t=>t.length&&t.every(v=>v===t[0])))&&tries<220);return c}
    function start(lv=level){level=lv;localStorage.setItem('nutSortLevel',String(level));tubes=gen(level);initialTubes=clone(tubes);history=[];selected=null;moves=0;locked=false;arrival=null;introMode=true;winModal.classList.remove('show');setHint('Собери гайки одного цвета на каждом стержне');render();setTimeout(()=>introMode=false,900)}
    function groupSize(t){if(!t.length)return 0;const c=top(t);let n=0;for(let i=t.length-1;i>=0&&t[i]===c;i--)n++;return n}
    function moveCount(from,to){if(from===to||!tubes[from].length||tubes[to].length>=CAPACITY)return 0;if(tubes[to].length&&top(tubes[from])!==top(tubes[to]))return 0;return Math.min(groupSize(tubes[from]),CAPACITY-tubes[to].length)}
    function word(n){if(n===1)return'1 гайка';if(n>=2&&n<=4)return`${n} гайки`;return`${n} гаек`}
    function render(){levelEl.textContent=level;movesEl.textContent=moves;undoBtn.disabled=history.length===0||locked;boardEl.style.setProperty('--cols',Math.ceil(tubes.length/2));boardEl.innerHTML='';tubes.forEach((tube,i)=>{const b=document.createElement('button');b.className='tube';b.setAttribute('aria-label',`Стержень ${i+1}`);if(selected===i)b.classList.add('selected');if(introMode){b.classList.add('enter');b.style.animationDelay=`${i*45}ms`}if(tube.length===CAPACITY&&tube.every(v=>v===tube[0]))b.classList.add('done');const rod=document.createElement('div');rod.className='rod';const base=document.createElement('div');base.className='base';const nuts=document.createElement('div');nuts.className='nuts';const g=selected===i?groupSize(tube):0;tube.forEach((c,ni)=>{const n=document.createElement('div');n.className='nut';if(g&&ni>=tube.length-g)n.classList.add('move');if(arrival&&arrival.tube===i&&ni>=arrival.start&&ni<arrival.start+arrival.count)n.classList.add('ghost');if(introMode){n.classList.add('enter');n.style.animationDelay=`${140+i*34+ni*44}ms`}n.style.setProperty('--c',COLORS[c]);nuts.appendChild(n)});b.append(rod,base,nuts);b.addEventListener('click',()=>tap(i));boardEl.appendChild(b)})}
    async function tap(i){if(locked)return;if(selected===null){if(!tubes[i].length)return toast('Здесь пока нет гаек');selected=i;const g=groupSize(tubes[i]);setHint(g>1?`Выбрана группа: ${word(g)} одного цвета`:'Теперь выбери стержень, куда перенести гайку');render();pulse(i);return}if(selected===i){selected=null;setHint('Выбор отменён');render();return}const from=selected,count=moveCount(from,i);if(!count){selected=null;setHint('Такой ход нельзя сделать');render();const target=boardEl.children[i];target?.classList.add('invalid');setTimeout(()=>target?.classList.remove('invalid'),420);return}const fromEls=nutEls(from).slice(-count),fromRects=fromEls.map(e=>e.getBoundingClientRect()),moving=tubes[from].slice(tubes[from].length-count);history.push({state:clone(tubes),moves});tubes[from].splice(tubes[from].length-count,count);tubes[i].push(...moving);moves++;selected=null;locked=true;arrival={tube:i,start:tubes[i].length-count,count};setHint(count>1?`Перенесено сразу: ${word(count)}`:'Хороший ход!');render();const toRects=nutEls(i).slice(-count).map(e=>e.getBoundingClientRect());await fly(moving,fromRects,toRects);arrival=null;locked=false;render();if(solved(tubes))win()}
    function nutEls(i){return Array.from(boardEl.children[i]?.querySelectorAll('.nut')||[])}
    function fly(colors,fromRects,toRects){return Promise.all(colors.map((c,i)=>{const from=fromRects[i],to=toRects[i];if(!from||!to)return Promise.resolve();const clone=document.createElement('div');clone.className='nut fly';clone.style.setProperty('--c',COLORS[c]);clone.style.left=`${from.left}px`;clone.style.top=`${from.top}px`;clone.style.width=`${from.width}px`;clone.style.height=`${from.height}px`;document.body.appendChild(clone);const dx=to.left-from.left,dy=to.top-from.top,lift=Math.min(165,82+Math.abs(dx)*.36+i*8),spin=(i%2===0?14:-14)+i*3,duration=760+i*90,delay=i*60;const a=clone.animate([{transform:'translate3d(0,0,0) scale(1) rotateZ(0deg)',offset:0,easing:'cubic-bezier(.22,.84,.18,1)'},{transform:`translate3d(${dx*.46}px,${dy*.32-lift}px,0) scale(1.12) rotateZ(${spin}deg)`,offset:.52,easing:'cubic-bezier(.22,.84,.18,1)'},{transform:`translate3d(${dx}px,${dy}px,0) scale(1) rotateZ(0deg)`,offset:1,easing:'cubic-bezier(.18,.9,.2,1)'}],{duration,delay,fill:'forwards'});return a.finished.then(()=>clone.remove()).catch(()=>clone.remove())}))}
    function pulse(i){boardEl.children[i]?.animate([{transform:'scale(1.012)',filter:'brightness(1)'},{transform:'scale(1.035)',filter:'brightness(1.06)'},{transform:'scale(1.012)',filter:'brightness(1)'}],{duration:520,easing:'cubic-bezier(.2,.9,.2,1)'})}
    function win(){locked=true;confetti();setTimeout(()=>winModal.classList.add('show'),520)}
    function undo(){if(locked)return;const p=history.pop();if(!p)return;tubes=clone(p.state);moves=p.moves;selected=null;arrival=null;locked=false;setHint('Последний ход отменён');render()}
    function restart(){tubes=clone(initialTubes);history=[];selected=null;arrival=null;moves=0;locked=false;introMode=true;winModal.classList.remove('show');setHint('Уровень начат заново');render();setTimeout(()=>introMode=false,900)}
    function possible(){const r=[];for(let f=0;f<tubes.length;f++)for(let t=0;t<tubes.length;t++){const count=moveCount(f,t);if(!count)continue;const col=top(tubes[f]),same=tubes[t].length&&top(tubes[t])===col,expose=tubes[f].length>count&&tubes[f][tubes[f].length-count-1]!==col;r.push({from:f,to:t,count,score:count*3+(same?4:0)+(expose?2:0)-(tubes[t].length===0?1:0)})}return r.sort((a,b)=>b.score-a.score)}
    function hint(){if(locked)return;const m=possible()[0];if(!m)return toast('Доступных ходов нет — попробуй отменить ход');selected=m.from;setHint(`Подсказка: перенеси ${word(m.count)} со стержня ${m.from+1} на ${m.to+1}`);render();boardEl.children[m.to]?.animate([{transform:'scale(1)',filter:'brightness(1)'},{transform:'scale(1.045)',filter:'brightness(1.08)'},{transform:'scale(1)',filter:'brightness(1)'}],{duration:860,iterations:2,easing:'cubic-bezier(.2,.9,.2,1)'})}
    function setHint(m){hintline.textContent=m;hintline.classList.remove('pop');void hintline.offsetWidth;hintline.classList.add('pop')}
    function toast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>toastEl.classList.remove('show'),1900)}
    function confetti(){const cs=['#facc15','#22c55e','#38bdf8','#8b5cf6','#ef4444','#ec4899'];for(let i=0;i<54;i++){const p=document.createElement('div');p.className='confetti';p.style.left=`${Math.random()*100}%`;p.style.setProperty('--confetti',cs[i%cs.length]);p.style.setProperty('--drift',`${(Math.random()*2-1)*120}px`);p.style.setProperty('--fall',`${1.4+Math.random()*1.4}s`);p.style.animationDelay=`${Math.random()*.28}s`;document.body.appendChild(p);setTimeout(()=>p.remove(),3200)}}
    document.getElementById('undoBtn').addEventListener('click',undo);document.getElementById('hintBtn').addEventListener('click',hint);document.getElementById('restartBtn').addEventListener('click',restart);document.getElementById('newBtn').addEventListener('click',()=>start(level));document.getElementById('replayBtn').addEventListener('click',restart);document.getElementById('nextBtn').addEventListener('click',()=>start(level+1));start(level);
  </script>
</body>
</html>
