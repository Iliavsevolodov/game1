<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Nut Sort — сортировка гаек</title>
  <style>
    :root {
      --bg-1:#111827;
      --bg-2:#1f2937;
      --panel:rgba(255,255,255,.08);
      --panel-border:rgba(255,255,255,.14);
      --text:#f9fafb;
      --muted:#cbd5e1;
      --accent:#facc15;
      --danger:#fb7185;
      --success:#4ade80;
      --rod:#d6d3d1;
      --rod-dark:#78716c;
      --base:#a8a29e;
      --shadow:0 18px 50px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; min-height:100%; background:#111827; color:var(--text); font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { min-height:100dvh; overflow-x:hidden; }

    .app {
      min-height:100dvh;
      padding: max(18px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 18% 0%, rgba(250,204,21,.13), transparent 30%),
        radial-gradient(circle at 88% 18%, rgba(59,130,246,.12), transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar {
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      max-width:980px;
      width:100%;
      margin:0 auto;
    }

    .brand { font-size:clamp(22px, 5vw, 34px); font-weight:900; letter-spacing:-.04em; }
    .brand span { color:var(--accent); }
    .level-pill {
      justify-self:center;
      background:var(--panel);
      border:1px solid var(--panel-border);
      padding:9px 14px;
      border-radius:999px;
      backdrop-filter:blur(16px);
      font-weight:800;
      box-shadow:var(--shadow);
      white-space:nowrap;
    }

    .stats { justify-self:end; text-align:right; color:var(--muted); font-weight:700; font-size:14px; }
    .stats strong { color:var(--text); font-size:18px; }

    .card {
      max-width:980px;
      width:100%;
      margin:0 auto;
      padding:14px;
      border-radius:24px;
      border:1px solid var(--panel-border);
      background:var(--panel);
      backdrop-filter: blur(18px);
      box-shadow:var(--shadow);
    }

    .hintline {
      text-align:center;
      color:var(--muted);
      font-weight:700;
      min-height:24px;
      margin-bottom:4px;
    }

    .board {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(72px, 1fr));
      gap:20px 12px;
      align-items:end;
      justify-items:center;
      min-height:440px;
      padding:18px 4px 12px;
    }

    .tube {
      position:relative;
      width:74px;
      height:224px;
      border:0;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      transition:transform .18s ease, filter .18s ease;
      touch-action:manipulation;
    }

    .tube:hover { transform:translateY(-3px); }
    .tube.selected { transform:translateY(-12px); filter:drop-shadow(0 10px 16px rgba(250,204,21,.32)); }
    .tube.invalid { animation:shake .25s linear 1; }
    .tube.complete::after {
      content:"✓";
      position:absolute;
      top:-2px;
      right:0;
      width:26px;
      height:26px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:var(--success);
      color:#052e16;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(74,222,128,.35);
      z-index:8;
    }

    .rod {
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      width:12px;
      height:196px;
      border-radius:999px;
      background:repeating-linear-gradient(180deg, #f5f5f4 0 4px, #a8a29e 4px 7px);
      box-shadow: inset -3px 0 2px rgba(0,0,0,.25), 0 8px 16px rgba(0,0,0,.28);
      z-index:1;
    }

    .rod::before {
      content:"";
      position:absolute;
      left:50%; top:-5px;
      transform:translateX(-50%);
      width:18px; height:9px;
      border-radius:50%;
      background:linear-gradient(#fafaf9,#a8a29e);
      box-shadow:0 2px 4px rgba(0,0,0,.28);
    }

    .base {
      position:absolute;
      left:50%;
      bottom:6px;
      transform:translateX(-50%);
      width:64px;
      height:18px;
      border-radius:50% 50% 18px 18px;
      background:linear-gradient(180deg,#e7e5e4,#78716c);
      box-shadow:0 7px 12px rgba(0,0,0,.28), inset 0 2px 3px rgba(255,255,255,.55);
      z-index:2;
    }

    .nuts {
      position:absolute;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      width:60px;
      display:flex;
      flex-direction:column-reverse;
      align-items:center;
      z-index:3;
      pointer-events:none;
    }

    .nut {
      width:58px;
      height:36px;
      margin-top:-2px;
      position:relative;
      clip-path:polygon(15% 7%,85% 7%,100% 50%,85% 93%,15% 93%,0 50%);
      background:var(--c);
      box-shadow:inset 0 6px 7px rgba(255,255,255,.22), inset 0 -7px 8px rgba(0,0,0,.22), 0 4px 7px rgba(0,0,0,.28);
      transition:transform .22s ease;
    }

    .nut::after {
      content:"";
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:15px; height:15px;
      border-radius:50%;
      background:radial-gradient(circle, #4b5563 0 35%, #d6d3d1 38% 56%, rgba(255,255,255,.2) 60%);
      box-shadow:inset 0 2px 3px rgba(0,0,0,.5);
    }

    .selected .nut:last-child { transform:translateY(-13px) rotate(-3deg); }

    .controls {
      max-width:980px;
      width:100%;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
    }

    .btn {
      border:1px solid var(--panel-border);
      border-radius:16px;
      min-height:52px;
      padding:10px 12px;
      background:rgba(255,255,255,.09);
      color:var(--text);
      font:inherit;
      font-weight:850;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }
    .btn:active { transform:translateY(1px) scale(.99); }
    .btn.primary { background:var(--accent); color:#201a00; border-color:transparent; }
    .btn:disabled { opacity:.42; cursor:not-allowed; }

    .modal {
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      padding:20px;
      background:rgba(2,6,23,.68);
      backdrop-filter:blur(10px);
      z-index:20;
    }
    .modal.show { display:grid; }
    .modal-box {
      width:min(430px,100%);
      padding:28px;
      border-radius:28px;
      text-align:center;
      background:linear-gradient(180deg,#ffffff,#e5e7eb);
      color:#111827;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
    }
    .modal-box h2 { margin:0 0 8px; font-size:34px; }
    .modal-box p { margin:0 0 18px; color:#475569; font-weight:650; }
    .modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .toast {
      position:fixed;
      left:50%;
      bottom:max(24px, env(safe-area-inset-bottom));
      transform:translate(-50%, 120px);
      background:#fff;
      color:#111827;
      padding:12px 16px;
      border-radius:999px;
      font-weight:800;
      box-shadow:0 15px 40px rgba(0,0,0,.35);
      transition:transform .25s ease;
      z-index:30;
      white-space:nowrap;
    }
    .toast.show { transform:translate(-50%,0); }

    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

    @media (max-width:600px) {
      .topbar { grid-template-columns:1fr auto; }
      .level-pill { order:3; grid-column:1/-1; }
      .stats { font-size:12px; }
      .stats strong { font-size:16px; }
      .card { padding:10px 8px; border-radius:20px; }
      .board { grid-template-columns:repeat(4,1fr); gap:18px 2px; min-height:430px; }
      .tube { width:68px; height:205px; }
      .rod { height:180px; }
      .nut { width:54px; height:33px; }
      .base { width:58px; }
      .controls { grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">NUT <span>SORT</span></div>
      <div class="level-pill">Уровень <span id="level">1</span></div>
      <div class="stats">Ходы<br><strong id="moves">0</strong></div>
    </header>

    <section class="card">
      <div class="hintline" id="hintline">Собери гайки одного цвета на каждом стержне</div>
      <div class="board" id="board" aria-label="Игровое поле"></div>
    </section>

    <section class="controls">
      <button class="btn" id="undoBtn">↶ Отменить</button>
      <button class="btn" id="hintBtn">💡 Подсказка</button>
      <button class="btn" id="restartBtn">⟳ Заново</button>
      <button class="btn primary" id="newBtn">Новый уровень</button>
    </section>
  </main>

  <div class="modal" id="winModal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div style="font-size:58px">🏆</div>
      <h2>Уровень пройден!</h2>
      <p>Отличная сортировка. Переходим дальше?</p>
      <div class="modal-actions">
        <button class="btn" id="replayBtn" style="color:#111827;border-color:#cbd5e1;background:#fff">Повторить</button>
        <button class="btn primary" id="nextBtn">Дальше →</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const COLORS = ['#22c55e','#8b5cf6','#ef4444','#06b6d4','#facc15','#f97316','#ec4899','#3b82f6'];
    const CAPACITY = 5;

    const boardEl = document.getElementById('board');
    const movesEl = document.getElementById('moves');
    const levelEl = document.getElementById('level');
    const hintline = document.getElementById('hintline');
    const undoBtn = document.getElementById('undoBtn');
    const winModal = document.getElementById('winModal');
    const toastEl = document.getElementById('toast');

    let level = Number(localStorage.getItem('nutSortLevel') || 1);
    let tubes = [];
    let initialTubes = [];
    let selected = null;
    let history = [];
    let moves = 0;
    let locked = false;

    function cloneState(state) { return state.map(t => [...t]); }

    function randomInt(max) { return Math.floor(Math.random() * max); }

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function generateLevel(levelNumber) {
      const colorCount = Math.min(4 + Math.floor((levelNumber - 1) / 3), 7);
      const emptyCount = levelNumber < 4 ? 2 : 2;
      const pieces = [];
      for (let c = 0; c < colorCount; c++) {
        for (let i = 0; i < CAPACITY; i++) pieces.push(c);
      }

      let candidate;
      let attempts = 0;
      do {
        const mixed = shuffle(pieces);
        candidate = [];
        for (let i = 0; i < colorCount; i++) candidate.push(mixed.slice(i * CAPACITY, (i + 1) * CAPACITY));
        for (let i = 0; i < emptyCount; i++) candidate.push([]);
        attempts++;
      } while ((isSolved(candidate) || candidate.some(t => t.every(v => v === t[0]))) && attempts < 200);

      return candidate;
    }

    function startLevel(newLevel = level) {
      level = newLevel;
      localStorage.setItem('nutSortLevel', String(level));
      tubes = generateLevel(level);
      initialTubes = cloneState(tubes);
      history = [];
      selected = null;
      moves = 0;
      locked = false;
      winModal.classList.remove('show');
      hintline.textContent = 'Собери гайки одного цвета на каждом стержне';
      render();
    }

    function render() {
      levelEl.textContent = level;
      movesEl.textContent = moves;
      undoBtn.disabled = history.length === 0;
      boardEl.innerHTML = '';

      tubes.forEach((tube, index) => {
        const button = document.createElement('button');
        button.className = 'tube';
        button.setAttribute('aria-label', `Стержень ${index + 1}`);
        if (selected === index) button.classList.add('selected');
        if (tube.length === CAPACITY && tube.every(v => v === tube[0])) button.classList.add('complete');

        const rod = document.createElement('div');
        rod.className = 'rod';
        const base = document.createElement('div');
        base.className = 'base';
        const nuts = document.createElement('div');
        nuts.className = 'nuts';

        tube.forEach(colorIndex => {
          const nut = document.createElement('div');
          nut.className = 'nut';
          nut.style.setProperty('--c', COLORS[colorIndex]);
          nuts.appendChild(nut);
        });

        button.append(rod, base, nuts);
        button.addEventListener('click', () => handleTube(index, button));
        boardEl.appendChild(button);
      });
    }

    function topColor(tube) { return tube[tube.length - 1]; }

    function canMove(from, to) {
      if (from === to) return false;
      if (tubes[from].length === 0) return false;
      if (tubes[to].length >= CAPACITY) return false;
      return tubes[to].length === 0 || topColor(tubes[from]) === topColor(tubes[to]);
    }

    function handleTube(index, el) {
      if (locked) return;

      if (selected === null) {
        if (tubes[index].length === 0) return showToast('Здесь пока нет гаек');
        selected = index;
        hintline.textContent = 'Теперь выбери стержень, куда перенести гайку';
        render();
        return;
      }

      if (selected === index) {
        selected = null;
        hintline.textContent = 'Выбор отменён';
        render();
        return;
      }

      const from = selected;
      if (!canMove(from, index)) {
        selected = null;
        hintline.textContent = 'Такой ход нельзя сделать';
        render();
        const target = boardEl.children[index];
        target?.classList.add('invalid');
        setTimeout(() => target?.classList.remove('invalid'), 280);
        return;
      }

      history.push({ state: cloneState(tubes), moves });
      tubes[index].push(tubes[from].pop());
      moves++;
      selected = null;
      hintline.textContent = 'Хороший ход!';
      render();

      if (isSolved(tubes)) {
        locked = true;
        setTimeout(() => winModal.classList.add('show'), 450);
      }
    }

    function isSolved(state) {
      return state.every(tube => tube.length === 0 || (tube.length === CAPACITY && tube.every(v => v === tube[0])));
    }

    function undo() {
      const previous = history.pop();
      if (!previous) return;
      tubes = cloneState(previous.state);
      moves = previous.moves;
      selected = null;
      locked = false;
      hintline.textContent = 'Последний ход отменён';
      render();
    }

    function restart() {
      tubes = cloneState(initialTubes);
      history = [];
      selected = null;
      moves = 0;
      locked = false;
      winModal.classList.remove('show');
      hintline.textContent = 'Уровень начат заново';
      render();
    }

    function getPossibleMoves() {
      const result = [];
      for (let from = 0; from < tubes.length; from++) {
        for (let to = 0; to < tubes.length; to++) {
          if (!canMove(from, to)) continue;
          const movingColor = topColor(tubes[from]);
          const joinsSame = tubes[to].length > 0 && topColor(tubes[to]) === movingColor;
          const exposesDifferent = tubes[from].length > 1 && tubes[from][tubes[from].length - 2] !== movingColor;
          result.push({ from, to, score: (joinsSame ? 4 : 0) + (exposesDifferent ? 2 : 0) - (tubes[to].length === 0 ? 1 : 0) });
        }
      }
      return result.sort((a,b) => b.score - a.score);
    }

    function showHint() {
      const move = getPossibleMoves()[0];
      if (!move) return showToast('Доступных ходов нет — попробуй отменить ход');
      selected = move.from;
      hintline.textContent = `Подсказка: перенеси гайку со стержня ${move.from + 1} на ${move.to + 1}`;
      render();
      const target = boardEl.children[move.to];
      target?.animate([
        { transform:'translateY(0)' },
        { transform:'translateY(-10px)' },
        { transform:'translateY(0)' }
      ], { duration:650, iterations:2 });
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('hintBtn').addEventListener('click', showHint);
    document.getElementById('restartBtn').addEventListener('click', restart);
    document.getElementById('newBtn').addEventListener('click', () => startLevel(level));
    document.getElementById('replayBtn').addEventListener('click', restart);
    document.getElementById('nextBtn').addEventListener('click', () => startLevel(level + 1));

    startLevel(level);
  </script>
</body>
</html>
