<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#0f172a"><title>Nut Sort</title><style>:root{--bg:#0f172a;--bg2:#1e293b;--line:rgba(255,255,255,.17);--text:#f8fafc;--muted:#cbd5e1;--yellow:#facc15;--green:#4ade80;--app-h:100svh}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none;touch-action:manipulation}body{position:fixed;inset:0;user-select:none}button{font:inherit;appearance:none;-webkit-appearance:none}.app{height:var(--app-h);padding:max(14px,env(safe-area-inset-top)) 12px max(14px,env(safe-area-inset-bottom));display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:10px;overflow:hidden;background:radial-gradient(circle at 18% 0%,rgba(250,204,21,.16),transparent 28%),radial-gradient(circle at 82% 14%,rgba(56,189,248,.15),transparent 30%),linear-gradient(180deg,var(--bg),var(--bg2));position:relative}.topbar,.card,.controls{width:100%;max-width:980px;margin:0 auto}.topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}.brand{font-size:clamp(22px,5vw,34px);font-weight:1000;letter-spacing:-.045em}.brand span{color:var(--yellow)}.level-pill{justify-self:center;padding:9px 14px;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.075));border:1px solid var(--line);font-weight:900;white-space:nowrap;box-shadow:0 12px 30px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.2)}.stats{justify-self:end;text-align:right;color:var(--muted);font-weight:800;font-size:13px}.stats strong{color:var(--text);font-size:18px}.card{height:100%;min-height:0;padding:10px 8px;border-radius:26px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.055));box-shadow:0 22px 60px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.18);display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden;position:relative}.hintline{text-align:center;color:var(--muted);font-weight:850;min-height:28px;line-height:28px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.board{--cols:4;display:grid;grid-template-columns:repeat(var(--cols),minmax(0,1fr));grid-template-rows:repeat(2,minmax(0,1fr));gap:16px 6px;align-items:end;justify-items:center;width:100%;height:100%;min-height:0;padding:12px 0 8px;overflow:hidden;position:relative}.tube{position:relative;width:100%;max-width:72px;height:100%;min-height:160px;max-height:210px;border:0;background:transparent;padding:0;cursor:pointer;display:flex;justify-content:flex-end;align-items:center;outline:none;transition:filter .28s ease,transform .28s ease}.tube.selected{filter:drop-shadow(0 14px 20px rgba(250,204,21,.28));transform:scale(1.018)}.tube.invalid{animation:shake .36s ease}.tube.done:after{content:"✓";position:absolute;top:-4px;right:0;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#86efac,#22c55e);color:#052e16;font-weight:1000;z-index:8}.rod{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:11px;height:calc(100% - 20px);max-height:180px;border-radius:999px;background:linear-gradient(90deg,#707070 0%,#f8fafc 18%,#d4d4d8 42%,#fff 52%,#8b8b8b 100%);box-shadow:inset -3px 0 3px rgba(0,0,0,.28),inset 3px 0 3px rgba(255,255,255,.38),0 10px 18px rgba(0,0,0,.3);z-index:1}.rod:before{content:"";position:absolute;inset:0;border-radius:inherit;background:repeating-linear-gradient(180deg,transparent 0 4px,rgba(0,0,0,.13) 4px 6px)}.rod:after{content:"";position:absolute;left:50%;top:-4px;transform:translateX(-50%);width:19px;height:9px;border-radius:50%;background:radial-gradient(ellipse at 42% 28%,#fff 0 20%,#d4d4d8 42%,#71717a 100%);box-shadow:0 3px 5px rgba(0,0,0,.34)}.base{position:absolute;left:50%;bottom:4px;transform:translateX(-50%);width:90%;max-width:64px;height:19px;border-radius:50% 50% 18px 18px;background:radial-gradient(ellipse at 42% 20%,#fafafa 0 12%,#d6d3d1 42%,#71717a 100%);box-shadow:0 9px 16px rgba(0,0,0,.36),inset 0 3px 4px rgba(255,255,255,.62),inset 0 -5px 6px rgba(0,0,0,.22);z-index:2}.nuts{position:absolute;left:50%;bottom:21px;transform:translateX(-50%);width:84%;max-width:58px;display:flex;flex-direction:column-reverse;align-items:center;z-index:3;pointer-events:none}.nut{width:100%;height:34px;margin-top:-2px;position:relative;clip-path:polygon(15% 7%,85% 7%,100% 50%,85% 93%,15% 93%,0 50%);background:radial-gradient(ellipse at 28% 16%,rgba(255,255,255,.58) 0 10%,transparent 30%),linear-gradient(90deg,rgba(0,0,0,.35) 0%,rgba(255,255,255,.22) 16%,rgba(255,255,255,.34) 38%,rgba(0,0,0,.10) 64%,rgba(0,0,0,.40) 100%),linear-gradient(180deg,rgba(255,255,255,.20),transparent 38%,rgba(0,0,0,.24)),var(--c);box-shadow:inset 0 7px 8px rgba(255,255,255,.28),inset 0 -8px 9px rgba(0,0,0,.28),0 5px 8px rgba(0,0,0,.34);transition:transform .36s cubic-bezier(.2,.9,.2,1),filter .36s ease,opacity .2s ease}.nut:after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 45% 42%,#111827 0 30%,#6b7280 31% 45%,#f8fafc 48% 60%,rgba(255,255,255,.15) 66%);box-shadow:inset 0 3px 5px rgba(0,0,0,.68),0 1px 2px rgba(255,255,255,.42)}.nut.move{filter:brightness(1.08) saturate(1.08)}.selected .nut.move{transform:translateY(-7px) rotateZ(-3deg) scale(1.02)}.ghost{opacity:0}.fly{position:fixed;margin:0;z-index:999;pointer-events:none;will-change:transform}.controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.btn{border:1px solid var(--line);border-radius:18px;min-height:52px;padding:10px 12px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.07));color:var(--text);font-weight:900;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.18)}.btn:active{transform:scale(.99)}.btn.primary{background:linear-gradient(180deg,#fde047,#eab308);color:#201a00;border-color:transparent}.btn:disabled{opacity:.42}.modal{position:fixed;inset:0;display:none;place-items:center;padding:20px;background:rgba(2,6,23,.68);backdrop-filter:blur(10px);z-index:20}.modal.show{display:grid}.modal-box{width:min(430px,100%);padding:28px;border-radius:30px;text-align:center;background:linear-gradient(180deg,#fff,#e5e7eb);color:#111827;box-shadow:0 34px 90px rgba(0,0,0,.48)}.modal-box h2{margin:0 0 8px}.modal-box p{color:#475569}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.toast{position:fixed;left:50%;bottom:max(24px,env(safe-area-inset-bottom));transform:translate(-50%,120px);background:#fff;color:#111827;padding:12px 16px;border-radius:999px;font-weight:900;transition:transform .3s ease;z-index:30}.toast.show{transform:translate(-50%,0)}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}@media(min-width:700px){.controls{grid-template-columns:repeat(4,minmax(0,1fr))}}</style></head><body><main class="app"><header class="topbar"><div class="brand">NUT <span>SORT</span></div><div class="level-pill">Уровень <span id="level">1</span></div><div class="stats">Ходы<br><strong id="moves">0</strong></div></header><section class="card"><div class="hintline" id="hintline">Собери гайки одного цвета на каждом стержне</div><div class="board" id="board"></div></section><section class="controls"><button class="btn" id="undoBtn">↶ Отменить</button><button class="btn" id="hintBtn">💡 Подсказка</button><button class="btn" id="restartBtn">⟳ Заново</button><button class="btn primary" id="newBtn">Новый уровень</button></section></main><div class="modal" id="winModal"><div class="modal-box"><div style="font-size:58px">🏆</div><h2>Уровень пройден!</h2><p>Переходим дальше?</p><div class="modal-actions"><button class="btn" id="replayBtn" style="color:#111827;background:#fff">Повторить</button><button class="btn primary" id="nextBtn">Дальше →</button></div></div></div><div class="toast" id="toast"></div><script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script><script>const COLORS=['#22c55e','#8b5cf6','#ef4444','#06b6d4','#facc15','#f97316','#ec4899','#3b82f6'],CAPACITY=5;const boardEl=document.getElementById('board'),movesEl=document.getElementById('moves'),levelEl=document.getElementById('level'),hintline=document.getElementById('hintline'),undoBtn=document.getElementById('undoBtn'),winModal=document.getElementById('winModal'),toastEl=document.getElementById('toast');let level=Number(localStorage.getItem('nutSortLevel')||1),tubes=[],initialTubes=[],selected=null,history=[],moves=0,locked=false,arrival=null;const clone=s=>s.map(t=>[...t]),rnd=m=>Math.floor(Math.random()*m),topColor=t=>t[t.length-1];function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}function solved(state){return state.every(t=>t.length===0||(t.length===CAPACITY&&t.every(v=>v===t[0])))}function gen(lv){const colors=Math.min(4+Math.floor((lv-1)/3),7),pieces=[];for(let c=0;c<colors;c++)for(let i=0;i<CAPACITY;i++)pieces.push(c);let candidate,tries=0;do{const mixed=shuffle(pieces);candidate=[];for(let i=0;i<colors;i++)candidate.push(mixed.slice(i*CAPACITY,(i+1)*CAPACITY));candidate.push([],[]);tries++}while((solved(candidate)||candidate.some(t=>t.length&&t.every(v=>v===t[0])))&&tries<220);return candidate}function groupSize(t){if(!t.length)return 0;const c=topColor(t);let n=0;for(let i=t.length-1;i>=0&&t[i]===c;i--)n++;return n}function moveCount(from,to){if(from===to||!tubes[from].length||tubes[to].length>=CAPACITY)return 0;if(tubes[to].length&&topColor(tubes[from])!==topColor(tubes[to]))return 0;return Math.min(groupSize(tubes[from]),CAPACITY-tubes[to].length)}function word(n){if(n===1)return'1 гайка';if(n>=2&&n<=4)return`${n} гайки`;return`${n} гаек`}function start(lv=level){level=lv;localStorage.setItem('nutSortLevel',String(level));tubes=gen(level);initialTubes=clone(tubes);history=[];selected=null;moves=0;locked=false;arrival=null;winModal.classList.remove('show');setHint('Собери гайки одного цвета на каждом стержне');render()}function render(){levelEl.textContent=level;movesEl.textContent=moves;undoBtn.disabled=history.length===0||locked;boardEl.style.setProperty('--cols',String(Math.ceil(tubes.length/2)));boardEl.innerHTML='';tubes.forEach((tube,i)=>{const b=document.createElement('button');b.className='tube';if(selected===i)b.classList.add('selected');if(tube.length===CAPACITY&&tube.every(v=>v===tube[0]))b.classList.add('done');const rod=document.createElement('div');rod.className='rod';const base=document.createElement('div');base.className='base';const nuts=document.createElement('div');nuts.className='nuts';const g=selected===i?groupSize(tube):0;tube.forEach((c,ni)=>{const n=document.createElement('div');n.className='nut';if(g&&ni>=tube.length-g)n.classList.add('move');if(arrival&&arrival.tube===i&&ni>=arrival.start&&ni<arrival.start+arrival.count)n.classList.add('ghost');n.style.setProperty('--c',COLORS[c]);nuts.appendChild(n)});b.append(rod,base,nuts);b.addEventListener('click',()=>tap(i));boardEl.appendChild(b)})}async function tap(i){if(locked)return;if(selected===null){if(!tubes[i].length)return toast('Здесь пока нет гаек');selected=i;const g=groupSize(tubes[i]);setHint(g>1?`Выбрана группа: ${word(g)}`:'Выбери стержень для переноса');render();pulse(i);return}if(selected===i){selected=null;setHint('Выбор отменён');render();return}const from=selected,count=moveCount(from,i);if(!count){selected=null;setHint('Такой ход нельзя сделать');render();const t=boardEl.children[i];t?.classList.add('invalid');setTimeout(()=>t?.classList.remove('invalid'),400);return}const fromEls=nutEls(from).slice(-count),fromRects=fromEls.map(e=>e.getBoundingClientRect()),moving=tubes[from].slice(tubes[from].length-count);history.push({state:clone(tubes),moves});tubes[from].splice(tubes[from].length-count,count);tubes[i].push(...moving);moves++;selected=null;locked=true;arrival={tube:i,start:tubes[i].length-count,count};setHint(count>1?`Перенесено: ${word(count)}`:'Хороший ход!');render();const toRects=nutEls(i).slice(-count).map(e=>e.getBoundingClientRect());await fly(moving,fromRects,toRects);arrival=null;locked=false;render();if(solved(tubes))win()}function nutEls(i){return Array.from(boardEl.children[i]?.querySelectorAll('.nut')||[])}function fly(colors,fromRects,toRects){return Promise.all(colors.map((c,i)=>new Promise(resolve=>{const from=fromRects[i],to=toRects[i];if(!from||!to)return resolve();const el=document.createElement('div');el.className='nut fly';el.style.setProperty('--c',COLORS[c]);el.style.left=`${from.left}px`;el.style.top=`${from.top}px`;el.style.width=`${from.width}px`;el.style.height=`${from.height}px`;document.body.appendChild(el);const dx=to.left-from.left,dy=to.top-from.top,lift=Math.min(150,76+Math.abs(dx)*.32+i*7);if(window.gsap){gsap.timeline({delay:i*.05,onComplete:()=>{el.remove();resolve()}}).to(el,{duration:.42,x:dx*.48,y:dy*.34-lift,scale:1.1,rotation:i%2? -14:14,ease:'power2.out'}).to(el,{duration:.46,x:dx,y:dy,scale:1,rotation:0,ease:'power3.inOut'})}else{const a=el.animate([{transform:'translate3d(0,0,0)'},{transform:`translate3d(${dx*.48}px,${dy*.34-lift}px,0) scale(1.1)`},{transform:`translate3d(${dx}px,${dy}px,0)`}],{duration:850+i*60,fill:'forwards',easing:'cubic-bezier(.2,.9,.2,1)'});a.finished.then(()=>{el.remove();resolve()}).catch(()=>{el.remove();resolve()})}})))}function pulse(i){const el=boardEl.children[i];if(!el)return;if(window.gsap)gsap.fromTo(el,{scale:1.018},{scale:1.04,duration:.2,yoyo:true,repeat:1,ease:'sine.inOut'});else el.animate([{transform:'scale(1.018)'},{transform:'scale(1.04)'},{transform:'scale(1.018)'}],{duration:450})}function win(){locked=true;setTimeout(()=>winModal.classList.add('show'),420)}function undo(){if(locked)return;const p=history.pop();if(!p)return;tubes=clone(p.state);moves=p.moves;selected=null;arrival=null;setHint('Последний ход отменён');render()}function restart(){tubes=clone(initialTubes);history=[];selected=null;arrival=null;moves=0;locked=false;winModal.classList.remove('show');setHint('Уровень начат заново');render()}function possible(){const r=[];for(let f=0;f<tubes.length;f++)for(let t=0;t<tubes.length;t++){const count=moveCount(f,t);if(count)r.push({from:f,to:t,count})}return r}function hint(){if(locked)return;const m=possible()[0];if(!m)return toast('Доступных ходов нет');selected=m.from;setHint(`Перенеси ${word(m.count)} со стержня ${m.from+1} на ${m.to+1}`);render();pulse(m.to)}function setHint(m){hintline.textContent=m}function toast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>toastEl.classList.remove('show'),1800)}document.getElementById('undoBtn').onclick=undo;document.getElementById('hintBtn').onclick=hint;document.getElementById('restartBtn').onclick=restart;document.getElementById('newBtn').onclick=()=>start(level);document.getElementById('replayBtn').onclick=restart;document.getElementById('nextBtn').onclick=()=>start(level+1);start(level);</script></body></html>
